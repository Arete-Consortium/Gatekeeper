version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eve-gatekeeper-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - gatekeeper-network

networks:
  gatekeeper-network:
    driver: bridge
