---
# Kustomize configuration for EVE Gatekeeper
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eve-gatekeeper

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - postgres.yaml
  - redis.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/part-of: eve-gatekeeper
  app.kubernetes.io/managed-by: kustomize

images:
  - name: eve-gatekeeper
    newTag: latest
