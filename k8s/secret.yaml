---
# EVE Gatekeeper Secrets
# IMPORTANT: Do not commit actual secrets to git!
# Use kubectl create secret or external secrets management.
#
# Example: kubectl create secret generic eve-gatekeeper-secrets \
#   --from-literal=SECRET_KEY=$(openssl rand -base64 32) \
#   --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 16) \
#   --from-literal=ESI_CLIENT_ID=your-client-id \
#   --from-literal=ESI_SECRET_KEY=your-secret-key \
#   -n eve-gatekeeper
apiVersion: v1
kind: Secret
metadata:
  name: eve-gatekeeper-secrets
  namespace: eve-gatekeeper
  labels:
    app.kubernetes.io/name: eve-gatekeeper
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Required - Generate with: openssl rand -base64 32
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS"

  # PostgreSQL password - Generate with: openssl rand -base64 16
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"

  # Optional - ESI OAuth credentials (get from EVE Developer Portal)
  # ESI_CLIENT_ID: "your-client-id"
  # ESI_SECRET_KEY: "your-secret-key"

  # Optional - Webhooks
  # DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/..."
  # SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/..."

  # Optional - Monitoring
  # SENTRY_DSN: "https://xxx@sentry.io/xxx"
