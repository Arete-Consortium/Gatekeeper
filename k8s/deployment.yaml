---
# EVE Gatekeeper API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eve-gatekeeper
  namespace: eve-gatekeeper
  labels:
    app.kubernetes.io/name: eve-gatekeeper
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: eve-gatekeeper
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eve-gatekeeper
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: eve-gatekeeper
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: eve-gatekeeper
          image: eve-gatekeeper:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: eve-gatekeeper-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: eve-gatekeeper-secrets
                  key: SECRET_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eve-gatekeeper-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgresql://gatekeeper:$(POSTGRES_PASSWORD)@postgres:5432/eve_gatekeeper"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: eve-gatekeeper-data
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: eve-gatekeeper
                    app.kubernetes.io/component: api
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
