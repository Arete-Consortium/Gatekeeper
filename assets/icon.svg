<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gate-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0066cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a1628"/>
  <!-- Outer ring (stargate) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gate-grad)" stroke-width="24"/>
  <!-- Inner gate glow -->
  <circle cx="256" cy="256" r="140" fill="#001a33" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.6"/>
  <!-- Navigation arrow/chevron -->
  <path d="M180 256 L256 180 L332 256 L256 332 Z" fill="none" stroke="#00d4ff" stroke-width="12" stroke-linejoin="round"/>
  <path d="M220 256 L256 220 L292 256 L256 292 Z" fill="#00d4ff" opacity="0.8"/>
  <!-- Stars -->
  <circle cx="100" cy="120" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="400" cy="100" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="380" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="80" cy="400" r="2" fill="#fff" opacity="0.5"/>
</svg>
