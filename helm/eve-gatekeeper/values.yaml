# Default values for eve-gatekeeper.

# -- Number of API replicas (ignored when autoscaling is enabled)
replicaCount: 2

image:
  # -- Container image repository
  repository: eve-gatekeeper
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default is the chart appVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []
# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a service account
  create: true
  # -- Annotations for the service account
  annotations: {}
  # -- Override the service account name
  name: ""

service:
  # -- Kubernetes service type
  type: ClusterIP
  # -- Service port
  port: 80

ingress:
  # -- Enable ingress
  enabled: true
  # -- Ingress class name
  className: nginx
  # -- Additional ingress annotations
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
  # -- Ingress hostname
  host: api.eve-gatekeeper.example.com
  tls:
    # -- Enable TLS on the ingress
    enabled: false
    # -- TLS secret name (leave empty to auto-generate with cert-manager)
    secretName: ""
    # -- Annotations added when TLS is enabled (e.g., cert-manager issuer)
    annotations: {}
    #   cert-manager.io/cluster-issuer: "letsencrypt-prod"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  # -- Enable Horizontal Pod Autoscaler
  enabled: true
  # -- Minimum replicas
  minReplicas: 2
  # -- Maximum replicas
  maxReplicas: 10
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 70
  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Termination grace period in seconds
terminationGracePeriodSeconds: 30

podAntiAffinity:
  # -- Enable pod anti-affinity to spread API pods across nodes
  enabled: true

# -- Additional pod annotations
podAnnotations: {}

# -- Node selector constraints
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules (merged with podAntiAffinity when enabled)
affinity: {}

# -- Create the namespace via the chart
createNamespace: false

# ------------------------------------------------------------------------------
# PostgreSQL
# ------------------------------------------------------------------------------
postgresql:
  # -- Deploy PostgreSQL as part of this chart
  enabled: true
  image:
    repository: postgres
    tag: "15-alpine"
  # -- PostgreSQL username
  user: gatekeeper
  # -- PostgreSQL database name
  database: eve_gatekeeper
  # -- Persistent storage size
  storage: 5Gi
  # -- Storage class (empty uses the cluster default)
  storageClass: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ------------------------------------------------------------------------------
# Redis
# ------------------------------------------------------------------------------
redis:
  # -- Deploy Redis as part of this chart
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  # -- Redis max memory setting
  maxMemory: "256mb"
  # -- Redis eviction policy
  maxMemoryPolicy: "allkeys-lru"
  # -- Persistent storage size
  storage: 1Gi
  # -- Storage class (empty uses the cluster default)
  storageClass: ""
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ------------------------------------------------------------------------------
# Application data PVC
# ------------------------------------------------------------------------------
persistence:
  # -- Enable persistent storage for application data
  enabled: true
  # -- Storage size
  size: 1Gi
  # -- Storage class (empty uses the cluster default)
  storageClass: ""
  # -- Access mode
  accessMode: ReadWriteOnce

# ------------------------------------------------------------------------------
# Prometheus / Metrics
# ------------------------------------------------------------------------------
prometheus:
  # -- Enable Prometheus scrape annotations on the API pods
  enabled: true
  # -- Metrics port
  port: "8000"
  # -- Metrics path
  path: "/metrics"

# ------------------------------------------------------------------------------
# Application config (maps to ConfigMap)
# ------------------------------------------------------------------------------
config:
  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  # Database (overridden at runtime by POSTGRES_URL env var when postgresql.enabled)
  DATABASE_URL: "sqlite:///./eve_gatekeeper.db"

  # ESI Configuration
  ESI_BASE_URL: "https://esi.evetech.net/latest"
  ESI_CONCURRENCY_LIMIT: "20"
  ESI_TIMEOUT: "30.0"

  # zKillboard
  ZKILL_BASE_URL: "https://zkillboard.com/api"
  ZKILL_REDISQ_URL: "https://redisq.zkillboard.com/listen.php"

  # WebSocket
  WS_INITIAL_RETRY_DELAY: "1.0"
  WS_MAX_RETRY_DELAY: "60.0"
  WS_RETRY_MULTIPLIER: "2.0"
  WS_MAX_RETRY_ATTEMPTS: "0"
  WS_HEALTH_CHECK_INTERVAL: "30.0"
  WS_CONNECTION_TIMEOUT: "10.0"

  # Cache TTLs
  CACHE_TTL_ESI: "300"
  CACHE_TTL_ROUTE: "600"
  CACHE_TTL_RISK: "120"

  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_PER_MINUTE: "100"
  RATE_LIMIT_PER_MINUTE_USER: "200"
  RATE_LIMIT_PER_MINUTE_APIKEY: "300"

  # Features
  METRICS_ENABLED: "true"
  UNIVERSE_REFRESH_ENABLED: "true"
  KILL_HISTORY_ENABLED: "true"
  REDIS_PUBSUB_ENABLED: "true"

# ------------------------------------------------------------------------------
# Secrets
# ------------------------------------------------------------------------------
secrets:
  # -- Application secret key (CHANGE IN PRODUCTION)
  secretKey: "CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS"
  # -- PostgreSQL password (CHANGE IN PRODUCTION)
  postgresPassword: "CHANGE_ME_POSTGRES_PASSWORD"
  # -- Optional: ESI OAuth client ID
  esiClientId: ""
  # -- Optional: ESI OAuth secret key
  esiSecretKey: ""
  # -- Optional: Discord webhook URL
  discordWebhookUrl: ""
  # -- Optional: Slack webhook URL
  slackWebhookUrl: ""
  # -- Optional: Sentry DSN
  sentryDsn: ""
  # -- Use an existing secret instead of creating one
  existingSecret: ""
