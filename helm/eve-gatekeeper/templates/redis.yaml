{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eve-gatekeeper.redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eve-gatekeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "eve-gatekeeper.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        {{- include "eve-gatekeeper.labels" . | nindent 8 }}
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - {{ .Values.redis.maxMemory | quote }}
            - --maxmemory-policy
            - {{ .Values.redis.maxMemoryPolicy | quote }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: {{ include "eve-gatekeeper.redis.fullname" . }}-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "eve-gatekeeper.redis.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eve-gatekeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.redis.storageClass }}
  storageClassName: {{ .Values.redis.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.storage }}
{{- end }}
