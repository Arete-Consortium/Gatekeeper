apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eve-gatekeeper.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eve-gatekeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
