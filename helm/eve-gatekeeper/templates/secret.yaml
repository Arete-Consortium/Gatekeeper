{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eve-gatekeeper.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "eve-gatekeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  {{- if .Values.secrets.esiClientId }}
  ESI_CLIENT_ID: {{ .Values.secrets.esiClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.esiSecretKey }}
  ESI_SECRET_KEY: {{ .Values.secrets.esiSecretKey | quote }}
  {{- end }}
  {{- if .Values.secrets.discordWebhookUrl }}
  DISCORD_WEBHOOK_URL: {{ .Values.secrets.discordWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.slackWebhookUrl }}
  SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.sentryDsn }}
  SENTRY_DSN: {{ .Values.secrets.sentryDsn | quote }}
  {{- end }}
{{- end }}
